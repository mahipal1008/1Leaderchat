version: 1.2.1
cache: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true

registration:
  socialLogins: []
  allowedDomains: []

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# ─── AWS Bedrock Endpoint (Latest Models) ───
endpoints:
  bedrock:
    enabled: true
    availableRegions:
      - us-east-1
      - us-west-2
    streamRate: 35
    titleModel: "us.anthropic.claude-sonnet-4-20250514-v1:0"
    plugins: true

# ─── Memory (Cross-Conversation Persistence) ───
memory:
  enabled: true
  tokenLimit: 2000
  messageWindowSize: 10

# ─── Web Search (Serper.dev + Cohere Rerank via Bedrock) ───
webSearch:
  searchProvider: serper
  reranker:
    provider: cohere
    model: rerank-english-v3.0

# ─── Artifacts (SVG, HTML, React, Mermaid, Charts, etc.) ───
artifacts:
  enabled: true

# ─── Code Interpreter ───
codeInterpreter:
  enabled: true

# ─── MCP Servers (expandable) ───
mcpServers: {}

actions:
  allowedDomains: []
  fileStrategy: "local"

fileConfig:
  endpoints:
    bedrock:
      fileLimit: 10
      fileSizeLimit: 25
      supportedMimeTypes:
        - "image/jpeg"
        - "image/png"
        - "image/gif"
        - "image/webp"
        - "application/pdf"
        - "text/plain"
        - "text/markdown"
        - "text/csv"
        - "application/json"
        - "text/html"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
