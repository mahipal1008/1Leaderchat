version: 1.3.6
cache: true

# ─── Interface — All UI Features Enabled (Claude.ai parity) ───
interface:
  modelSelect: true
  parameters: true
  presets: false          # Must be false — conflicts with modelSpecs.prioritize
  bookmarks: true
  multiConvo: true
  runCode: false          # Enable when you get code.librechat.ai key
  webSearch: true
  fileSearch: true
  fileCitations: true
  temporaryChat: true
  memories: true
  sharedLinks: true
  prompts:
    use: true
    create: true
    share: true
  agents:
    use: true
    create: true
    share: true

# ─── Registration & Security ───
registration:
  socialLogins: []
  allowedDomains: []

# ─── Rate Limits ───
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# ─── Endpoints ───
endpoints:
  # ── AWS Bedrock (Primary — Claude Models) ──
  bedrock:
    models:
      - "us.anthropic.claude-opus-4-6-v1"
      - "us.anthropic.claude-sonnet-4-6"
      - "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    availableRegions:
      - us-east-1
    titleConvo: true
    titleModel: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    summarize: true
    summaryModel: "us.anthropic.claude-haiku-4-5-20251001-v1:0"

  # ── Agents Endpoint ──
  agents:
    capabilities:
      - "artifacts"

# ─── Model Specs (Claude.ai-like experience) ───
modelSpecs:
  enforce: false
  prioritize: true
  list:
    # ── Claude Opus 4.6 — Most Capable + Thinking ──
    - name: "opus-4-6-thinking"
      label: "Claude Opus 4.6"
      description: "Most capable model with deep reasoning, artifacts, and web search"
      iconURL: "anthropic"
      showIconInHeader: true
      showIconInMenu: true
      artifacts: true
      webSearch: true
      fileSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-opus-4-6-v1"
        modelLabel: "Claude Opus 4.6"
        greeting: "Hi, I'm Claude Opus 4.6 — the most capable model. I can reason deeply, generate artifacts (diagrams, charts, code, SVGs), search the web, and handle complex tasks."
        promptPrefix: |
          RENDERING RULES — Always follow these:

          TABLES → Use markdown tables for any comparison, list of items with properties,
          or structured data. Always include header row and alignment.

          MATH → Use $inline$ for simple expressions.
          Use $$display$$ for complex equations on their own line.

          CODE → Always specify language in code blocks. Never use plain text for code.

          LISTS → Use bullet points for unordered items. Use numbered lists for steps/sequences.

          HEADINGS → Use ## for main sections, ### for subsections in long responses.

          EMPHASIS → Bold **key terms** on first use. Use *italics* for technical terms or titles.

          ARTIFACT RULES — Use artifacts for all visual and interactive content:
          - ER DIAGRAMS → artifact type: application/vnd.mermaid | erDiagram syntax
          - FLOWCHARTS → artifact type: application/vnd.mermaid | graph TD or graph LR
          - SEQUENCE DIAGRAMS → artifact type: application/vnd.mermaid | sequenceDiagram
          - MIND MAPS → artifact type: application/vnd.mermaid | mindmap syntax
          - CLASS DIAGRAMS → artifact type: application/vnd.mermaid | classDiagram
          - GANTT CHARTS → artifact type: application/vnd.mermaid | gantt syntax
          - STATE DIAGRAMS → artifact type: application/vnd.mermaid | stateDiagram-v2
          - GIT GRAPHS → artifact type: application/vnd.mermaid | gitGraph
          - PIE CHARTS → artifact type: application/vnd.mermaid | pie
          - SVG GRAPHICS → artifact type: image/svg+xml | always include viewBox attribute
          - ADVANCED TABLES (>5 cols or >10 rows) → artifact type: application/vnd.react
            Build sortable, filterable table with search bar
          - TREE VIEWS → artifact type: application/vnd.react
            Build interactive expandable/collapsible tree
          - INTERACTIVE CHARTS → artifact type: application/vnd.react
            Use Recharts: BarChart, LineChart, PieChart, AreaChart with hover tooltips
          - DASHBOARDS → artifact type: application/vnd.react with Tailwind CSS
          - SIMPLE TABLES (<5 cols, <10 rows) → Use inline markdown table
          - HTML PAGES → artifact type: text/html with all CSS/JS inline
          ALWAYS include complete code, never truncate, never use placeholders in artifacts.
          Never say "rest of code remains same" — always write full complete code.
        temperature: 1
        maxOutputTokens: 16384
        maxContextTokens: 200000
        promptCache: true
        append_current_datetime: true
        thinking: true
        thinkingBudget: 10000
        resendFiles: true
        imageDetail: "high"

    # ── Claude Sonnet 4.6 — Default (Fast + Smart + Thinking) ──
    - name: "sonnet-4-6-thinking"
      label: "Claude Sonnet 4.6"
