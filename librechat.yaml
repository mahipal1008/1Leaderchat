version: 1.3.6
cache: true

# ─── Interface — All UI Features Enabled (Claude.ai parity) ───
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: false
  bookmarks: true
  multiConvo: true
  runCode: false
  webSearch: true
  fileSearch: true
  fileCitations: true
  temporaryChat: true
  memories: true
  prompts:
    use: true
    create: true
    share: true
  agents:
    use: true
    create: true
    share: true

registration:
  socialLogins: []
  allowedDomains: []

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# ─── Endpoints ───
endpoints:
  # ── AWS Bedrock (Primary — Claude Models) ──
  bedrock:
    models:
      - "us.anthropic.claude-opus-4-6-v1"
      - "us.anthropic.claude-sonnet-4-6"
      - "us.anthropic.claude-opus-4-20250514-v1:0"
      - "us.anthropic.claude-sonnet-4-20250514-v1:0"
      - "us.anthropic.claude-haiku-4-5-20251001-v1:0"
      - "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
      - "us.anthropic.claude-3-5-haiku-20241022-v1:0"
    availableRegions:
      - us-east-1
      - us-west-2
    streamRate: 35
    titleModel: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    summarize: true
    plugins: true

  # ── Agents Endpoint — Artifacts only (no execute_code without API key) ──
  agents:
    capabilities:
      - "artifacts"

# ─── Model Specs (Claude.ai-like experience) ───
modelSpecs:
  enforce: false
  prioritize: true
  list:
    # ── Claude Opus 4.6 — Most Capable + Thinking ──
    - name: "opus-4-6-thinking"
      label: "Claude Opus 4.6"
      description: "Most capable model with deep reasoning, artifacts, and web search"
      iconURL: "anthropic"
      showIconInHeader: true
      showIconInMenu: true
      artifacts: true
      webSearch: true
      fileSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-opus-4-6-v1"
        modelLabel: "Claude Opus 4.6"
        greeting: "Hi, I'm Claude Opus 4.6 — the most capable model. I can reason deeply, generate artifacts (diagrams, charts, code, SVGs), search the web, and handle complex tasks."
        promptPrefix: "RENDERING RULES — Always follow these:\n\nTABLES → Use markdown tables for any comparison, list of items with properties, or structured data. Always include header row and alignment.\n\nMATH → Use $inline$ for simple expressions. Use $$display$$ for complex equations on their own line.\n\nCODE → Always specify language in code blocks. Never use plain text for code.\n\nLISTS → Use bullet points for unordered items. Use numbered lists for steps/sequences.\n\nHEADINGS → Use ## for main sections, ### for subsections in long responses.\n\nEMPHASIS → Bold **key terms** on first use. Use *italics* for technical terms or titles.\n\nARTIFACT RULES:\n- ER DIAGRAMS → Use artifact type: application/vnd.mermaid with erDiagram syntax\n- FLOWCHARTS → Use artifact type: application/vnd.mermaid with graph TD or graph LR\n- SEQUENCE DIAGRAMS → Use artifact type: application/vnd.mermaid with sequenceDiagram\n- MIND MAPS → Use artifact type: application/vnd.mermaid with mindmap syntax\n- CLASS DIAGRAMS → Use artifact type: application/vnd.mermaid with classDiagram\n- GANTT CHARTS → Use artifact type: application/vnd.mermaid with gantt syntax\n- SVG GRAPHICS → Use artifact type: image/svg+xml\n- ADVANCED TABLES (>5 cols or >10 rows) → Use artifact type: application/vnd.react\n- TREE VIEWS → Use artifact type: application/vnd.react\n- INTERACTIVE CHARTS → Use artifact type: application/vnd.react with Recharts\n- SIMPLE TABLES (<5 cols, <10 rows) → Use inline markdown table\n- ALWAYS include complete code, never truncate, never use placeholders in artifacts"
        temperature: 1
        maxOutputTokens: 16384
        maxContextTokens: 200000
        promptCache: true
        append_current_datetime: true
        thinking: true
        thinkingBudget: 10000
        resendFiles: true
        imageDetail: "high"

    # ── Claude Sonnet 4.6 — Default (Fast + Smart + Thinking) ──
    - name: "sonnet-4-6-thinking"
      label: "Claude Sonnet 4.6"
      default: true
      description: "Fast and smart with thinking mode — great daily driver"
      iconURL: "anthropic"
      showIconInHeader: true
      showIconInMenu: true
      artifacts: true
      webSearch: true
      fileSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-sonnet-4-6"
        modelLabel: "Claude Sonnet 4.6"
        greeting: "Hi, I'm Claude Sonnet 4.6 — fast, smart, with reasoning. Perfect for coding, writing, and analysis."
        promptPrefix: "RENDERING RULES — Always follow these:\n\nTABLES → Use markdown tables for any comparison, list of items with properties, or structured data. Always include header row and alignment.\n\nMATH → Use $inline$ for simple expressions. Use $$display$$ for complex equations on their own line.\n\nCODE → Always specify language in code blocks. Never use plain text for code.\n\nLISTS → Use bullet points for unordered items. Use numbered lists for steps/sequences.\n\nHEADINGS → Use ## for main sections, ### for subsections in long responses.\n\nEMPHASIS → Bold **key terms** on first use. Use *italics* for technical terms or titles.\n\nARTIFACT RULES:\n- ER DIAGRAMS → Use artifact type: application/vnd.mermaid with erDiagram syntax\n- FLOWCHARTS → Use artifact type: application/vnd.mermaid with graph TD or graph LR\n- SEQUENCE DIAGRAMS → Use artifact type: application/vnd.mermaid with sequenceDiagram\n- MIND MAPS → Use artifact type: application/vnd.mermaid with mindmap syntax\n- CLASS DIAGRAMS → Use artifact type: application/vnd.mermaid with classDiagram\n- GANTT CHARTS → Use artifact type: application/vnd.mermaid with gantt syntax\n- SVG GRAPHICS → Use artifact type: image/svg+xml\n- ADVANCED TABLES (>5 cols or >10 rows) → Use artifact type: application/vnd.react\n- TREE VIEWS → Use artifact type: application/vnd.react\n- INTERACTIVE CHARTS → Use artifact type: application/vnd.react with Recharts\n- SIMPLE TABLES (<5 cols, <10 rows) → Use inline markdown table\n- ALWAYS include complete code, never truncate, never use placeholders in artifacts"
        temperature: 1
        maxOutputTokens: 16384
        maxContextTokens: 200000
        promptCache: true
        append_current_datetime: true
        thinking: true
        thinkingBudget: 8000
        resendFiles: true
        imageDetail: "high"

    # ── Claude Sonnet 4.6 — No Thinking (faster) ──
    - name: "sonnet-4-6-fast"
      label: "Claude Sonnet 4.6 (Fast)"
      description: "Sonnet without thinking mode — fastest responses"
      iconURL: "anthropic"
      showIconInMenu: true
      artifacts: true
      webSearch: true
      fileSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-sonnet-4-6"
        modelLabel: "Claude Sonnet 4.6 Fast"
        temperature: 0.5
        maxOutputTokens: 8192
        maxContextTokens: 200000
        promptCache: true
        append_current_datetime: true
        thinking: false
        resendFiles: true

    # ── Claude Haiku 4.5 — Instant ──
    - name: "haiku-4-5"
      label: "Claude Haiku 4.5"
      description: "Fastest and cheapest — instant responses"
      group: "Fast"
      iconURL: "anthropic"
      showIconInMenu: true
      artifacts: true
      webSearch: true
      fileSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
        modelLabel: "Claude Haiku 4.5"
        temperature: 0.5
        maxOutputTokens: 4096
        maxContextTokens: 200000
        promptCache: true
        append_current_datetime: true
        thinking: false

    # ── Deep Research — Opus 4.6 Max Thinking ──
    - name: "deep-research"
      label: "Deep Research (Opus 4.6)"
      description: "Maximum reasoning + web search — deep research and complex analysis via Bedrock"
      iconURL: "anthropic"
      showIconInHeader: true
      showIconInMenu: true
      artifacts: true
      webSearch: true
      fileSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-opus-4-6-v1"
        modelLabel: "Deep Research"
        greeting: "I'm Deep Research mode — powered by Claude Opus 4.6 with maximum reasoning. I search the web, think deeply, cite sources, and provide comprehensive analysis."
        promptPrefix: "You are a deep research assistant with maximum reasoning capability. For every research question:\n1. Search the web thoroughly for current information\n2. Think deeply using your full reasoning budget\n3. Cite all sources with URLs\n4. Structure your response with clear headings\n5. Provide comprehensive analysis, not surface-level answers\n6. Include data, statistics, and evidence where available\n7. Compare multiple perspectives when relevant\n8. End with key takeaways and actionable insights\n\nRENDERING RULES:\n- TABLES → Use markdown tables for comparisons and structured data\n- MATH → Use $inline$ and $$display$$ LaTeX\n- CODE → Always specify language in code blocks\n- ER DIAGRAMS → artifact type: application/vnd.mermaid with erDiagram\n- FLOWCHARTS → artifact type: application/vnd.mermaid with graph TD/LR\n- SEQUENCE DIAGRAMS → artifact type: application/vnd.mermaid with sequenceDiagram\n- SVG GRAPHICS → artifact type: image/svg+xml\n- ADVANCED TABLES → artifact type: application/vnd.react\n- INTERACTIVE CHARTS → artifact type: application/vnd.react with Recharts\n- ALWAYS include complete code, never truncate"
        temperature: 1
        maxOutputTokens: 32000
        maxContextTokens: 200000
        promptCache: true
        append_current_datetime: true
        thinking: true
        thinkingBudget: 20000
        effort: "max"
        resendFiles: true
        imageDetail: "high"

# ─── Memory System (Claude.ai-like) ───
# Memory agent runs after each message, extracts facts, stores in MongoDB.
# Stored memories are automatically injected into all future conversations.
# Timeout patched from 3s → 30s in Dockerfile for Bedrock compatibility.
memory:
  disabled: false
  personalize: true
  tokenLimit: 8000
  charLimit: 10000
  messageWindowSize: 10
  agent:
    provider: "bedrock"
    model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    instructions: |
      You are a memory management assistant. Analyze conversations and manage the user's memory store using set_memory and delete_memory tools.

      ALWAYS STORE when the user:
      - Asks to remember something ("Remember...", "Don't forget...", "Note that...", "Keep in mind...")
      - Shares personal facts: name, role, location, education, job, company, preferences, goals, expertise
      - Mentions projects they're working on, tools they use, or tech stack
      - Corrects previous info ("Actually my name is...", "I changed to...")
      - States preferences ("Always respond in English", "I prefer concise answers")
      - Shares context about their work, team, deadlines, or environment

      ALWAYS DELETE when:
      - User explicitly asks to forget something
      - User corrects outdated info (delete old → store new)

      DO NOT STORE:
      - Casual greetings or small talk
      - Temporary task details (one-time questions)
      - Info already in memory (check existing memories first)

      KEY NAMING: lowercase_with_underscores, be specific:
      user_name, user_role, user_location, user_education, project_dinesync, preference_language, tech_stack

      CRITICAL: If there IS something to remember, call set_memory IMMEDIATELY. If nothing to remember, end without calling tools. Never explain your reasoning.

# ─── Web Search (Serper.dev Google Search) ───
webSearch:
  searchProvider: serper

# ─── Speech — Browser Built-in Voice (no API key needed) ───
speech:
  speechTab:
    conversationMode: true
    advancedMode: false
    speechToText:
      engineSTT: "browser"
      autoTranscribeAudio: true
      autoSendText: 0
      decibelValue: -45
    textToSpeech:
      engineTTS: "browser"
      automaticPlayback: false
      playbackRate: 1.0

# ─── Usage Tracking ───
balance:
  enabled: false

transactions:
  enabled: true

# ─── MCP Servers ───
mcpServers: {}

mcpSettings:
  allowedDomains:
    - "mcp.notion.com"
    - "*.anthropic.com"

actions:
  allowedDomains: []

fileConfig:
  endpoints:
    bedrock:
      fileLimit: 20
      fileSizeLimit: 50
      supportedMimeTypes:
        - "image/jpeg"
        - "image/png"
        - "image/gif"
        - "image/webp"
        - "application/pdf"
        - "text/plain"
        - "text/markdown"
        - "text/csv"
        - "application/json"
        - "text/html"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
