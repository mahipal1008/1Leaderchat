# ─── Memory System ───
# Using Bedrock + 30s timeout patch (Dockerfile sed).
# PR #11353 fixed the Bedrock system-message-first bug in the latest image.
# If memory still fails, switch to provider: "anthropic" + add ANTHROPIC_API_KEY.
memory:
  disabled: false
  personalize: true
  tokenLimit: 10000
  charLimit: 10000
  messageWindowSize: 10
  validKeys:
    - "user_preferences"
    - "learned_facts"
    - "personal_information"
    - "work_context"
    - "projects"
    - "skills"
    - "goals"
    - "location"
  agent:
    provider: "bedrock"
    model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    instructions: |
      You are a memory management assistant. Analyze conversations and manage
      the user's memory store using set_memory and delete_memory tools.

      Store information ONLY in these categories:
      - user_preferences: Communication style, formatting, language, response preferences
      - learned_facts: Facts the user has stated about themselves, work, or knowledge
      - personal_information: Name, location, education, background (only what user shares)
      - work_context: Job, company, role, team, tools, tech stack
      - projects: Current projects, status, goals, tech stack, deadlines
      - skills: Programming languages, frameworks, tools, expertise, certifications
      - goals: Short-term and long-term goals, learning objectives, career goals
      - location: City, country, timezone (only what user shares)

      RULES:
      - Store ONLY explicitly stated information, never infer or assume
      - Update existing entries when user corrects or changes information
      - Delete outdated information when user provides an update
      - Keep entries concise but complete (under 200 characters each)
      - Never store sensitive data like passwords or payment info
      - If nothing new is mentioned, do not store anything
      - Call set_memory IMMEDIATELY when there is something to store
      - End without calling tools if there is nothing to store

# ─── Web Search (Serper.dev Google Search) ───
webSearch:
  searchProvider: serper
  rerank: true
  scraperTimeout: 10000

# ─── Speech — Browser Built-in Voice (no API key needed) ───
speech:
  speechTab:
    conversationMode: true
    advancedMode: false
    speechToText:
      engineSTT: "browser"
      autoTranscribeAudio: true
      autoSendText: 0
      decibelValue: -45
    textToSpeech:
      engineTTS: "browser"
      automaticPlayback: false
      playbackRate: 1.0
      cacheTTS: true

# ─── Usage Tracking ───
# balance.enabled: false — your account was created before balance tracking.
# Enabling it causes "Insufficient Funds! Balance: 0" for existing users.
# transactions.enabled tracks usage without blocking.
balance:
  enabled: false

transactions:
  enabled: true

# ─── MCP Servers ───
# Notion MCP works via streamable-http (no npx needed in Docker).
# Filesystem/Puppeteer need npx which doesn't work in Render Docker.
# Claude.ai MCP endpoints (gmail/gcal.mcp.claude.com) are exclusive to Claude.ai.
mcpServers:
  notion:
    type: streamable-http
    url: https://mcp.notion.com/mcp
    serverInstructions: true
    timeout: 30000

mcpSettings:
  allowedDomains:
    - "mcp.notion.com"
    - "*.anthropic.com"
    - "github.com"
    - "api.github.com"

actions:
  allowedDomains: []

# ─── File Config ───
fileConfig:
  endpoints:
    bedrock:
      fileLimit: 20
      fileSizeLimit: 50
      supportedMimeTypes:
        - "image/jpeg"
        - "image/png"
        - "image/gif"
        - "image/webp"
        - "application/pdf"
        - "text/plain"
        - "text/markdown"
        - "text/csv"
        - "application/json"
        - "text/html"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        - "application/vnd.oasis.opendocument.spreadsheet"
        - "application/vnd.oasis.opendocument.text"
