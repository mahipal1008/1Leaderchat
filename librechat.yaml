version: 1.2.1
cache: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true

registration:
  socialLogins: []
  allowedDomains: []

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# ─── AWS Bedrock Endpoint (Latest Models 2026) ───
endpoints:
  bedrock:
    models:
      - "us.anthropic.claude-opus-4-20250514-v1:0"
      - "us.anthropic.claude-sonnet-4-20250514-v1:0"
      - "us.anthropic.claude-3-5-haiku-20241022-v1:0"
    availableRegions:
      - us-east-1
      - us-west-2
    streamRate: 35
    titleModel: "us.anthropic.claude-3-5-haiku-20241022-v1:0"

# ─── Memory (Cross-Conversation Persistence) ───
memory:
  enabled: true

# ─── Web Search (Serper.dev Google Search) ───
webSearch:
  searchProvider: serper

mcpServers: {}

actions:
  allowedDomains: []

fileConfig:
  endpoints:
    bedrock:
      fileLimit: 10
      fileSizeLimit: 25
      supportedMimeTypes:
        - "image/jpeg"
        - "image/png"
        - "image/gif"
        - "image/webp"
        - "application/pdf"
        - "text/plain"
        - "text/markdown"
        - "text/csv"
        - "application/json"
        - "text/html"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
