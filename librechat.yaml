version: 1.3.7
cache: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  temporaryChat: true
  memories: true
  prompts:
    use: true
    create: true
    share: true
  agents:
    use: true
    create: true
    share: true

registration:
  socialLogins: []
  allowedDomains: []

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# ─── AWS Bedrock Endpoint ───
endpoints:
  bedrock:
    models:
      - "us.anthropic.claude-opus-4-6-v1"
      - "us.anthropic.claude-sonnet-4-6"
      - "us.anthropic.claude-opus-4-20250514-v1:0"
      - "us.anthropic.claude-sonnet-4-20250514-v1:0"
      - "us.anthropic.claude-haiku-4-5-20251001-v1:0"
      - "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
      - "us.anthropic.claude-3-5-haiku-20241022-v1:0"
    availableRegions:
      - us-east-1
      - us-west-2
    streamRate: 35
    titleModel: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    plugins: true

# ─── Model Specs (Claude.ai-like experience) ───
modelSpecs:
  enforce: false
  prioritize: true
  list:
    # ── Claude Opus 4.6 — Most Capable + Thinking ──
    - name: "opus-4-6-thinking"
      label: "Claude Opus 4.6"
      default: true
      description: "Most capable model with deep reasoning, artifacts, and web search"
      iconURL: "anthropic"
      showIconInHeader: true
      showIconInMenu: true
      artifacts: true
      webSearch: true
      executeCode: true
      fileSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-opus-4-6-v1"
        modelLabel: "Claude Opus 4.6"
        greeting: "Hi, I'm Claude Opus 4.6 — the most capable model. I can reason deeply, generate artifacts (diagrams, charts, code, SVGs), search the web, and handle complex tasks."
        temperature: 0.7
        maxOutputTokens: 16384
        promptCache: true
        append_current_datetime: true
        thinking: true
        thinkingBudget: 10000
        resendFiles: true
        imageDetail: "high"

    # ── Claude Sonnet 4.6 — Fast + Smart + Thinking ──
    - name: "sonnet-4-6-thinking"
      label: "Claude Sonnet 4.6"
      description: "Fast and smart with thinking mode — great daily driver"
      iconURL: "anthropic"
      showIconInHeader: true
      showIconInMenu: true
      artifacts: true
      webSearch: true
      executeCode: true
      fileSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-sonnet-4-6"
        modelLabel: "Claude Sonnet 4.6"
        greeting: "Hi, I'm Claude Sonnet 4.6 — fast, smart, with reasoning. Perfect for coding, writing, and analysis."
        temperature: 0.7
        maxOutputTokens: 16384
        promptCache: true
        append_current_datetime: true
        thinking: true
        thinkingBudget: 8000
        resendFiles: true
        imageDetail: "high"

    # ── Claude Sonnet 4.6 — No Thinking (faster) ──
    - name: "sonnet-4-6-fast"
      label: "Claude Sonnet 4.6 (Fast)"
      description: "Sonnet without thinking mode — fastest responses"
      iconURL: "anthropic"
      showIconInMenu: true
      artifacts: true
      webSearch: true
      executeCode: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-sonnet-4-6"
        modelLabel: "Claude Sonnet 4.6 Fast"
        temperature: 0.5
        maxOutputTokens: 8192
        promptCache: true
        append_current_datetime: true
        thinking: false
        resendFiles: true

    # ── Claude Haiku 4.5 — Instant ──
    - name: "haiku-4-5"
      label: "Claude Haiku 4.5"
      description: "Fastest and cheapest — instant responses"
      group: "Fast"
      iconURL: "anthropic"
      showIconInMenu: true
      artifacts: true
      webSearch: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
        modelLabel: "Claude Haiku 4.5"
        temperature: 0.5
        maxOutputTokens: 4096
        promptCache: true
        append_current_datetime: true
        thinking: false

    # ── Claude Opus 4.6 — Max Thinking (research) ──
    - name: "opus-4-6-research"
      label: "Claude Opus 4.6 (Research)"
      description: "Maximum reasoning budget for complex analysis and research"
      group: "Research"
      iconURL: "anthropic"
      showIconInMenu: true
      artifacts: true
      webSearch: true
      fileSearch: true
      executeCode: true
      preset:
        endpoint: "bedrock"
        model: "us.anthropic.claude-opus-4-6-v1"
        modelLabel: "Claude Opus 4.6 Research"
        promptPrefix: "You are an expert research assistant. Think deeply, cite sources, and provide comprehensive analysis."
        temperature: 0.3
        maxOutputTokens: 32000
        promptCache: true
        append_current_datetime: true
        thinking: true
        thinkingBudget: 20000
        effort: "max"
        resendFiles: true
        imageDetail: "high"

# ─── Memory (Cross-Conversation Persistence) ───
memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  charLimit: 500
  messageWindowSize: 10
  agent:
    provider: "bedrock"
    model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    model_parameters:
      temperature: 0.3
      max_tokens: 500

# ─── Web Search (Serper.dev Google Search) ───
webSearch:
  searchProvider: serper

mcpServers: {}

actions:
  allowedDomains: []

fileConfig:
  endpoints:
    bedrock:
      fileLimit: 10
      fileSizeLimit: 25
      supportedMimeTypes:
        - "image/jpeg"
        - "image/png"
        - "image/gif"
        - "image/webp"
        - "application/pdf"
        - "text/plain"
        - "text/markdown"
        - "text/csv"
        - "application/json"
        - "text/html"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
